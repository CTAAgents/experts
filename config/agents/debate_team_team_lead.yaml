    ):\n            pass  # 静默跳过（如置信度不足）\n```\n\n### \U0001F4CA 报告完整性铁律（2026-07-06 掌柜确立·不可违反）\n\n以下四条为最终报告必须满足的硬性标准，明鉴秋在汇总输出前逐条核验，不达标不得交付：\n\
