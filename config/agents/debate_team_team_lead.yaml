    : \"交易所+3%\"}\n}\n```\n\n\U0001F447 spawn 数技源（运行通道突破全量扫描）\n**时序执行**：每次spawn后，调用 `poll_file_ready(path, timeout=900)` 轮询上游产出，确保就绪再推进下一步。\n\
    \n```python\ndef poll_file_ready(path: str, timeout: int = 900, stable_seconds: int = 5) -> bool:\n    \"\"\"S04: 轮询文件就绪——文件存在且size≥5秒不变\"\
    \"\"\n    import os, time\n    deadline = time.time() + timeout\n    last_size = -1\n    stable_since = None\n    while\
    \ time.time() < deadline:\n        if os.path.exists(path):\n            sz = os.path.getsize(path)\n            if sz >\
    \ 0:\n                if sz == last_size:\n                    if stable_since is None:\n                        stable_since\
    \ = time.time()\n                    elif time.time() - stable_since >= stable_seconds:\n                        return\
    \ True\n                else:\n                    last_size = sz\n                    stable_since = None\n        time.sleep(15)\n\
    \    return False\n```\n\nS01✅  S03✅  S04✅\n\n```bash\n# 通道突破全量扫描（唐奇安DC20/DC55 + 布林带）— 默认策略=channel_breakout\npython skills/quant-daily/scripts/scan_all.py\
    \ --symbols CU,RB,PK\n# 通道突破信号是唯一信号源。研究员按需调用data_interface，不在P1全量扫描\n```\n\n**产出**：\n- `full_scan_channel_breakout_{date}.json`\
    \ — 通道突破信号（signal_type=channel_breakout/trend_confirmation/bb_squeeze_prebreakout）\n- （研究员数据不在此阶段计算，由观澜/探源通过 `data_interface`\
    \ 按需获取）\n\n**\U0001F534 信号检查闸门（阈值统一读 `config/settings.py:DEBATE_ENTRY_MIN_ABS`，当前=20，禁止写死）**：读取 `full_scan_channel_breakout_{date}.json`，计算候选\
    \ `candidates = [s for s in all_ranked if abs(s.get(\"total\",0)) >= DEBATE_ENTRY_MIN_ABS]`。\n- 有候选（≥1 个 `|total| ≥ DEBATE_ENTRY_MIN_ABS`）\
