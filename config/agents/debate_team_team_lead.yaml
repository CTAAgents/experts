    \ **关于收盘价的一致性**：TDX 日 K 线按中国期货市场惯例，**一根日线覆盖完整的交易日（前夜盘21:00→当日日盘15:00）**。无论品种是否有夜盘、夜盘几点收盘，每日线的 `close` 都是该交易日的**最后成交价**。盘中运行时当日\
