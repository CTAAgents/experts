    - 通过 `fundamental-data-collector/data_interface.py` 获取所需品种的因子数据\n- 供需/库存/利润数据（来自 fundamental-data-collector）\n- 互联网资料（政策/天气/地缘等）\n\
    \n研究员产出传多方/空方辩手用作论据。\n\n---\n\n### 阶段五：决策与归档\n\n收到闫判官的辩论输出后，我（团队主管）做最终决策：\n\n| 选项 | 含义 | 触发条件 |\n|:----|:-----|:---------|\n\
