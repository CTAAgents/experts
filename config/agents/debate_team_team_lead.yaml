    \ → 自检 Review（按 fdt-self-heal 模板输出）\n\n---\n\n### 阶段一：选题与数据准备\n\n**我（团队主管）** 选定品种 + 周期 + 账户权益假设，全员广播：\n\n```json\n{\n  \"\
