# =============================================================================
# FDT Harness 工程规范检查规则
# 将 12 项 commit 前检查清单转为机读格式
# 版本: 1.1
# =============================================================================

version: "1.1"
description: "FDT Harness 工程规范检查规则 — 14 项 commit 前检查 + 11 条反模式"

checks:
  # ── C01: 架构变更 ─────────────────────────────────────────────────
  - id: C01
    name: "数据流/架构变更反映检查"
    severity: "P0"
    type: "file_modified"
    scope: "docs/harness/01-architecture.md"
    trigger_pattern: "fdt_langgraph|futures_data_core|pipeline"
    message: "架构/数据流变更必须同步更新 01-architecture.md"

  # ── C02: 生命周期 ─────────────────────────────────────────────────
  - id: C02
    name: "生命周期文档同步检查"
    severity: "P0"
    type: "file_modified"
    scope: "docs/harness/02-lifecycle.md"
    trigger_pattern: "scripts/.*\\.py|fdt_langgraph/.*\\.py"
    message: "代码变更必须同步更新 02-lifecycle.md"

  # ── C03: 配置项 ───────────────────────────────────────────────────
  - id: C03
    name: "配置项更新检查"
    severity: "P0"
    type: "file_modified"
    scope: "docs/harness/03-configuration.md"
    trigger_pattern: "config/|settings\\.json|\\w+\\.yaml"
    message: "新增/修改配置项必须更新 03-configuration.md"

  # ── C04: 降级/熔断 ────────────────────────────────────────────────
  - id: C04
    name: "降级/熔断路径检查"
    severity: "P0"
    type: "file_modified"
    scope: "docs/harness/04-resilience.md"
    trigger_pattern: "degrade|circuit_breaker|fallback|retry"
    message: "降级/熔断逻辑变更必须更新 04-resilience.md"

  # ── C05: 可观测性 ─────────────────────────────────────────────────
  - id: C05
    name: "可观测性文档检查"
    severity: "P0"
    type: "file_modified"
    scope: "docs/harness/05-observability.md"
    trigger_pattern: "trace_id|logger|metric|dashboard|health"
    message: "指标/日志/追踪变更必须更新 05-observability.md"

  # ── C06: 测试文档 ─────────────────────────────────────────────────
  - id: C06
    name: "测试文档更新检查"
    severity: "P1"
    type: "file_modified"
    scope: "docs/harness/06-testing.md"
    trigger_pattern: "tests/|test_.*\\.py"
    message: "测试文件变更时建议同步更新 06-testing.md"

  # ── C07: 版本号 ───────────────────────────────────────────────────
  - id: C07
    name: "版本号 bump 检查"
    severity: "P0"
    type: "version_check"
    scope: "pyproject.toml"
    trigger_pattern: null
    message: "任何代码变更后必须核对版本号是否需要 bump"

  # ── C08: 差距登记 ─────────────────────────────────────────────────
  - id: C08
    name: "差距登记检查"
    severity: "P1"
    type: "gap_check"
    scope: "docs/harness/08-gap-analysis.md"
    trigger_pattern: null
    message: "重大变更应考虑在 08-gap-analysis.md 登记新差距"

  # ── C09: 晋级计划 ─────────────────────────────────────────────────
  - id: C09
    name: "晋级计划检查"
    severity: "P1"
    type: "file_modified"
    scope: "docs/harness/09-advancement-plan.md"
    trigger_pattern: "v\\d+\\.\\d+|Phase_\\d+|milestone"
    message: "里程碑变更必须更新 09-advancement-plan.md"

  # ── C10: 流程文档 ─────────────────────────────────────────────────
  - id: C10
    name: "流程文档同步检查"
    severity: "P1"
    type: "file_modified"
    scope: "docs/harness/execution_modes_flowchart.md|docs/harness/business_flow.md"
    trigger_pattern: "pipeline|flow|workflow|process"
    message: "流程变更必须同步流程图文档"

  # ── C11: 角色职责 ─────────────────────────────────────────────────
  - id: C11
    name: "角色职责文档检查"
    severity: "P1"
    type: "file_modified"
    scope: "agents/*.md"
    trigger_pattern: "agents/.*\\.py|agents/.*\\.md"
    message: "Agent 角色变更必须同步 agents/*.md"

  # ── C12: 入口文档同步检查（通用规范）─────────────────────────────────
  # 适用于所有项目：CLAUDE.md（行为准则）+ CODE_WIKI.md（技术百科）+ README.md（项目说明）
  - id: C12
    name: "入口文档同步检查"
    severity: "P0"
    type: "file_modified"
    scope: "CLAUDE.md|CODE_WIKI.md|README.md"
    trigger_pattern: null
    message: "三大入口文档（CLAUDE.md/CODE_WIKI.md/README.md）必须同步更新，作为项目全生命周期核心文档"

  # ── C13: 交易建议可操作性 ─────────────────────────────────────────
  - id: C13
    name: "交易建议可操作性检查"
    severity: "P0"
    type: "process_check"
    scope: "debate_verdicts"
    trigger_pattern: "verdict|judge|risk_ming"
    message: >
      交易建议必须满足可操作性原则：
      (1) 明确'现价能否执行'（立即执行/等待触发/不交易）；
      (2) 现价开仓必须验证止损距离≤4%；
      (3) 盈亏比必须≥1:2（高波动品种可放宽至1:1.5）；
      (4) 反对仅给偏离现价的挂单价作为核心建议

  # ── C14: 正确性优先选择 ───────────────────────────────────────────
  - id: C14
    name: "正确性优先选择"
    severity: "P1"
    type: "process_check"
    scope: "memory/experience/patterns/"
    trigger_pattern: "config_delta|adaptation"
    message: >
      Harness 适配必须遵循正确性优先原则：
      (1) 任务奖励（辩论准确率/信号质量）决定排名；
      (2) token 成本仅作为平局打破条件；
      (3) 禁止为降低成本而牺牲正确性

  # ── C15: 文档一致性校验（v9.20.2 新增 — Layer 2 自动化） ────
  - id: C15
    name: "文档一致性校验"
    severity: "P1"
    type: "process_check"
    scope: "docs/harness/*.md"
    trigger_pattern: "docs/harness/.*\\.md"
    message: >
      Harness 文档与代码的一致性校验。运行
      `python scripts/verify_doc_consistency.py`
      检查各文档 `## 一致性元数据` 表格中的断言是否仍与代码匹配。
      每行断言对应一条可验证事实（函数存在、路径正确、版本一致等）。

anti_patterns:
  - id: AP01
    name: "巨型 Prompt"
    description: "AGENTS.md 文件超过 300 行，Prompt 过长可能导致 LLM 注意力分散"
    severity: "P1"
    check_type: "file_length"
    target: "AGENTS.md"
    threshold: 300
    message: "AGENTS.md 超过 300 行，建议拆分或精简"

  - id: AP02
    name: "跳过审核直接编码"
    description: "没有 plan/spec 文档就直接提交代码变更"
    severity: "P0"
    check_type: "process_check"
    target: ".claude/artifacts/designs/"
    message: "提交前必须有设计文档（.claude/artifacts/designs/ 下），禁止跳过审核直接编码"

  - id: AP03
    name: "Rules 不维护"
    description: "harness-rules.yaml 文件超过 30 天未修改，可能过时"
    severity: "P1"
    check_type: "last_modified"
    target: "docs/harness/harness-rules.yaml"
    threshold_days: 30
    message: "harness-rules.yaml 超过 30 天未更新，建议检查是否需要同步"

  - id: AP04
    name: "MCP 过度接入"
    description: "MCP 服务接入超过 10 个，可能导致依赖过多"
    severity: "P2"
    check_type: "count_check"
    target: "mcps/"
    threshold: 10
    message: "MCP 服务超过 10 个，建议评估必要性并清理"

  - id: AP05
    name: "Skill 不原子化"
    description: "单个 Skill 文件超过 200 行，职责过重"
    severity: "P1"
    check_type: "file_length"
    target: "skills/"
    threshold: 200
    message: "Skill 文件超过 200 行，建议拆分为多个原子化 Skill"

  - id: AP06
    name: "盲目信任 AI 输出"
    description: "生产路径无独立验证机制，直接使用 LLM 输出"
    severity: "P0"
    check_type: "process_check"
    target: "scripts/validate_*.py"
    message: "生产路径必须有独立验证器（validate_*.py），禁止盲目信任 AI 输出"

  - id: AP07
    name: "循环无停止条件"
    description: "Loop Contract 中 stop 字段为空，可能导致无限循环"
    severity: "P0"
    check_type: "contract_check"
    target: "docs/harness/loop-contracts/"
    message: "Loop Contract 必须定义 stop 条件，禁止无限循环"

  - id: AP08
    name: "多循环共写 STATE"
    description: "多个循环共用同一个 state 目录，可能导致状态冲突"
    severity: "P1"
    check_type: "path_check"
    target: "memory/debates/"
    message: "每个循环应有独立的 state 目录，禁止多循环共写"

  - id: AP09
    name: "Chat 历史当文档"
    description: "关键知识仅存在于对话历史中，未沉淀到文档"
    severity: "P2"
    check_type: "process_check"
    target: "docs/"
    message: "关键知识必须沉淀到 docs/ 目录下的文档中，禁止依赖 Chat 历史"

  - id: AP10
    name: "一个 PR 改所有"
    description: "单次 PR 修改超过 20 个文件，变更范围过大"
    severity: "P1"
    check_type: "file_count"
    target: null
    threshold: 20
    message: "PR 修改文件超过 20 个，建议拆分多个 PR"

  - id: AP11
    name: "不可操作的交易建议"
    description: "交易建议仅给出偏离现价的挂单价，未明确'现价能否执行'"
    severity: "P0"
    check_type: "process_check"
    target: "debate_verdicts"
    message: >
      交易建议必须回答'以当前价格能不能做'。
      发现以下模式即判定为 AP11 违规：
      (1) 仅给出偏离现价的入场区间，无'立即/等待/不交易'判定；
      (2) 盈亏比不达标（<1:2）仍建议现价开仓且风控未否决；
      (3) 风控明审核未以现价验证止损距离