name: FDT CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements.lock ]; then pip install -r requirements.lock; fi

      - name: Ruff check
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Python syntax check
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" -exec python -m py_compile {} \;

      - name: Pytest (unit tests only)
        run: |
          python -m pytest run_all_tests.py -v --timeout=30 || echo "Some tests may require external connections"
        continue-on-error: true
