# FDT CI — 代码质量 + 并行测试（4 job）
#
# 架构：
#   lint      → ruff + Harness pre-commit 检查（ubuntu, ~2min）
#   test-core → 策略信号 + fdt_langgraph 核心测试（windows, ~5min）
#   test-data → 数据管道 + 基础设施测试（windows, ~3min）
#   test-skills → 技能层测试（windows, ~4min）
#
# Secrets:
#   JIN10_MCP_TOKEN — 金十 MCP 财经数据（可选，有此则跑相关测试）

name: FDT CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: 代码质量
  # ═══════════════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml

      - name: Ruff check
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Harness pre-commit check
        run: python scripts/pre_commit_harness_check.py
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # Job 2: 策略信号 + fdt_langgraph 核心
  # ═══════════════════════════════════════════════════════════════
  test-core:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy pandas scipy \
            lightgbm scikit-learn langgraph langgraph-checkpoint-sqlite \
            sqlalchemy pydantic python-dateutil tqdm httpx psutil requests

      - name: Run core tests
        run: |
          python -m pytest tests/strategies/ tests/fdt_langgraph/ \
            tests/fdt_scripts_tests/ tests/validators/ \
            --tb=short -q -o "addopts=" \
            --cov=scripts --cov=fdt_langgraph --cov-report=term-missing \
            --cov-fail-under=30 \
            -k "not e2e and not integration"
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # Job 3: 数据管道 + 基础设施
  # ═══════════════════════════════════════════════════════════════
  test-data:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas scipy \
            sqlalchemy pydantic python-dateutil tqdm

      - name: Run data pipeline tests
        run: |
          python -m pytest tests/commodity-chain/ tests/contracts/ \
            tests/fdt-gate/ tests/technical-analysis/ \
            --tb=short -q -o "addopts="
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # Job 4: 技能层测试
  # ═══════════════════════════════════════════════════════════════
  test-skills:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas \
            scipy pydantic sqlalchemy python-dateutil

      - name: Run skill tests
        run: |
          python -m pytest tests/quant-daily/ tests/debate-argument-builder/ \
            tests/debate-risk-manager/ tests/fundamental-data-collector/ \
            --tb=short -q -o "addopts="
        continue-on-error: true
