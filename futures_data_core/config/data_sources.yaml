# futures-data-core 数据源配置
# 优先级从高到低；适配器按此顺序降级。

sources:
  - name: datacore
    priority: 0
    type: independent
    enabled: true
    description: Data-Core 统一数据接口（Python 包，内部管理 TDX/EastMoney/TqSDK/QMT 多源降级）
    detection:
      kind: import
      import: datacore
    config:
      version: ">=2.0.0"
      dominant_resolver_enabled: true
      gap_adjustment: false

  - name: tdx
    priority: 1
    type: independent
    enabled: true
    description: 通达信 TQ-Local 本地服务（Data-Core 不可用时备用）
    detection:
      kind: http_probe
      url: "http://127.0.0.1:17709/"
    config:
      base_url: "http://127.0.0.1:17709"
      timeout: 3.0

  - name: web_fallback
    priority: 2
    type: independent
    enabled: true
    description: Web 兜底采集器（新浪 + 东方财富免费公开 API）
    detection:
      kind: always_available
    config:
      primary: sina
      secondary: eastmoney
      confidence: 0.85

  - name: qmt_xtquant
    priority: 3
    type: independent
    enabled: true
    description: QMT/xtquant 本地 TCP 直取
    detection:
      kind: import
      import: xtdata
    config:
      timeout: 20.0

  - name: tqsdk
    priority: 98
    type: independent
    enabled: true
    description: 天勤量化 TqSDK (需账号，末位兜底)
    detection:
      kind: env_and_import
      env:
        - TQSDK_USERNAME
        - TQSDK_PASSWORD
      import: tqsdk
    config:
      username_env: TQSDK_USERNAME
      password_env: TQSDK_PASSWORD
      connect_timeout: 15.0
      kline_timeout: 25.0
      close_timeout: 5.0

  - name: postgres_cache
    priority: 3
    type: independent
    enabled: true
    description: Postgres 持久共享缓存（L2）
    detection:
      kind: import
      import: psycopg2
    config:
      dsn_env: FDC_PG_DSN

  - name: redis_cache
    priority: 4
    type: independent
    enabled: true
    description: Redis 热缓存 + 失效广播（L1）
    detection:
      kind: import
      import: redis
    config:
      url_env: FDC_REDIS_URL

# 降级触发条件
degrade:
  sub_daily_max_age_days: 7      # 子周期 K 线最后一根距今 > 7 天则降级
  daily_max_age_sessions: 5      # 日线 K 线最后一根距今 > 5 交易日则降级
  max_consecutive_failures: 3    # 连续失败次数达到则标记该源不可用

# 新鲜度断路器阈值 (data_freshness)
freshness:
  min_scan_success_rate: 0.90
  min_bars_per_symbol: 30
  max_daily_age_sessions: 5
  max_subdaily_age_days: 7
  min_positive_volume_ratio: 0.50
  max_scan_duration_seconds: 120
  max_output_json_mb: 5
  max_retries: 3
  retry_interval_minutes: 5
