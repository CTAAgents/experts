# coordination_config.yaml — FDT 协调配置
# 参考: Coordination Layer (arXiv:2605.03310)
# 使用: coordinator.py 加载此配置并调度 Agent
version: 2.1

# ── Agent 定义 ──

agents:
  shujiyuan:
    type: analyst
    description: "定论点（多/空方向），输出 scan_all.py 分析"
    timeout: 300

  tanyuan:
    type: researcher
    description: "供客观资料 — 地缘政治/宏观"
    timeout: 600

  guanlan:
    type: researcher
    description: "供客观资料 — 产业/供需"
    timeout: 600

  lianzhengyuan:
    type: researcher
    description: "供客观资料 — 链上数据/资金/舆情"
    timeout: 600

  zhengfang:
    type: debater
    role: positive
    description: "从研究员资料中提炼多头论据"
    timeout: 300

  fanfang:
    type: debater
    role: negative
    description: "从研究员资料中提炼空头论据"
    timeout: 300

  yanpanguan:
    type: judge
    description: "主持+裁决+时序控制+边界检查"
    timeout: 300

  cezhiyuan:
    type: strategist
    description: "交易策略师，接收判决合成方案"
    timeout: 300

  fengkongming:
    type: risk_manager
    description: "风险控制官，仓位沙盘推演+逻辑质检"
    timeout: 300

# ── 编排模式 ──

orchestration:
  mode: sequential

# ── 通信拓扑 ──

topology:
  edges:
    - from: shujiyuan
      to: [tanyuan, guanlan, lianzhengyuan]
    - from: [tanyuan, guanlan, lianzhengyuan]
      to: [zhengfang, fanfang]
    - from: [zhengfang, fanfang]
      to: [yanpanguan]
    - from: [yanpanguan]
      to: [cezhiyuan]
    - from: [cezhiyuan]
      to: [fengkongming]
    - from: [fengkongming]
      to: [yanpanguan]
    - from: [yanpanguan]
      to: [tanyuan, guanlan, lianzhengyuan]
    - from: [yanpanguan]
      to: [zhengfang, fanfang]

  broadcast:
    targets: [shujiyuan, tanyuan, guanlan, lianzhengyuan, zhengfang,
              fanfang, yanpanguan, cezhiyuan, fengkongming]
    triggers: ["phase_complete", "verdict_published"]

# ── 权限规则 ──

authority:
  accept_output: yanpanguan
  route_tasks: yanpanguan
  modify_config:
    roles: ["admin"]
    requires_confirm: true
  verdict_weighting:
    shujiyuan: 0.50
    debate: 0.30
    researchers: 0.20

# ── 终止条件 ──

termination:
  max_rounds: 3
  convergence_threshold: 0.85
  min_researchers_completed: 2
  timeout_behavior: "skip_and_warn"

# ── 审计 ──

audit:
  log_level: "full"
  log_path: "audit/"
  log_format: "jsonl"
  retention_days: 90

# ── 多模式预配置 ──

profiles:
  default:
    mode: sequential
    termination:
      max_rounds: 3
      convergence_threshold: 0.85

  fast:
    mode: sequential
    topology:
      edges:
        - from: shujiyuan
          to: [yanpanguan]
    termination:
      max_rounds: 1
      min_researchers_completed: 0
    verdict_weighting:
      shujiyuan: 0.90
      debate: 0.00
      researchers: 0.10

  deep_research:
    mode: sequential
    termination:
      max_rounds: 5
      convergence_threshold: 0.90
      min_researchers_completed: 3
    verdict_weighting:
      shujiyuan: 0.35
      debate: 0.25
      researchers: 0.40

  tournament:
    mode: sequential
    topology:
      edges:
        - from: shujiyuan
          to: [tanyuan, guanlan, lianzhengyuan]
        - from: [tanyuan, guanlan, lianzhengyuan]
          to: [zhengfang, fanfang]
        - from: [zhengfang]
          to: [fanfang]
        - from: [fanfang]
          to: [zhengfang]
        - from: [zhengfang, fanfang]
          to: [yanpanguan]
        - from: [yanpanguan]
          to: [cezhiyuan]
        - from: [cezhiyuan]
          to: [fengkongming]
        - from: [fengkongming]
          to: [yanpanguan]
    termination:
      max_rounds: 5
      convergence_threshold: 0.90
