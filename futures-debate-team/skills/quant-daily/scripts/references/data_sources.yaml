# =====================
# 数据源配置文件
# =====================
# 所有数据源在此注册：启用/禁用、盘中/盘后优先级、参数配置
# 优先级数字越小越优先（1 = 最高优先级）
# type: price = 价格/行情数据源（进入优先级路由链）
#       news  = 资讯/快讯/日历数据源（通过MCP工具单独调用）
#       comprehensive = 综合数据源（同时具备行情+资讯能力，通过MCP工具单独调用）
#       skillhub = 问财SkillHub数据源（通过iwencai-skillhub-cli安装的技能，通过CLI脚本调用）
# 修改此文件无需改动代码，重启服务生效

sources:
  - name: tqsdk
    display_name: 天勤量化
    type: price
    enabled: true
    priority_intraday: 1    # 盘中实时行情优先
    priority_afternoon: 3   # 盘后降级
    description: 盘中实时行情，需环境变量TQSDK_USERNAME/PASSWORD auth
    params:
      env_user: TQSDK_USERNAME
      env_pass: TQSDK_PASSWORD

  - name: exchange_api
    display_name: 交易所官方API
    type: price
    enabled: true
    priority_intraday: 3
    priority_afternoon: 2   # 盘后收盘数据
    description: 内嵌采集器，覆盖DCE/SHFE/CZCE/CFFEX/GFEX，UA旋转绕过WAF
    params: {}

  - name: eastmoney
    display_name: 东方财富
    type: price
    enabled: true
    priority_intraday: 2   # 盘中仅次于TqSdk（实时行情快照）
    priority_afternoon: 1  # 盘后最高优先级（时效性最佳）
    description: 公开HTTP接口，盘中实时行情快照+K线历史+合约列表
    params: {}

  - name: akshare
    display_name: AKShare
    type: price
    enabled: true
    priority_intraday: 4
    priority_afternoon: 4
    description: 开源数据源，覆盖60+品种主力连续，可有延迟
    params: {}

  - name: websearch
    display_name: WebSearch
    type: price
    enabled: true
    priority_intraday: 5
    priority_afternoon: 5
    description: 权威网站爬取，极端降级使用
    params: {}

  - name: cache
    display_name: 历史缓存
    type: price
    enabled: true
    priority_intraday: 6
    priority_afternoon: 6
    description: 本地缓存兜底，DuckDB 4h TTL / JSON 1d TTL
    params:
      duckdb_ttl_hours: 4
      json_ttl_days: 1

  - name: jin10
    display_name: 金十数据MCP
    type: news
    enabled: true
    priority_intraday: 98    # 不参与价格数据路由
    priority_afternoon: 98
    description: 金十财经数据MCP（资讯/快讯/日历），通过 WorkBuddy MCP 接口调用
    params:
      server_url: https://mcp.jin10.com/mcp
      tools:
        - get_quote       # 外盘品种实时报价（XAUUSD/USOIL等）
        - get_kline       # 外盘品种分钟K线
        - list_flash      # 7×24h实时快讯列表
        - search_flash    # 搜索快讯
        - list_news       # 财经文章列表
        - search_news     # 搜索财经文章
        - get_news        # 获取文章详情
        - list_calendar   # 财经日历

  - name: tdx
    display_name: 通达信MCP
    type: comprehensive
    enabled: true
    priority_intraday: 97    # 不参与价格数据路由
    priority_afternoon: 97
    description: 通达信MCP（行情/资讯/研报/宏观），通过 WorkBuddy MCP 接口调用
    params:
      connector_name: tdx-connector
      price_tools:
        - tdx_quotes       # 实时行情（期货需扩展行情 target="1"）
        - tdx_kline        # K线数据（期货需 target="1" + 市场代码）
        - tdx_api_data     # 统一金融API调用
      info_tools:
        - wenda_news_query     # 新闻/快讯/主题资讯
        - wenda_notice_query   # 公司公告/定期报告
        - wenda_report_query   # 券商研报/评级/目标价
        - wenda_macro_query    # 宏观经济/产业景气数据
      research_tools:
        - tdx_screener         # 条件选股
        - tdx_indicator_select # 结构化指标查询
        - tdx_lookup_stock     # 证券代码检索

  - name: iwencai
    display_name: 问财SkillHub
    type: skillhub
    enabled: true
    priority_intraday: 96    # 不参与价格数据路由
    priority_afternoon: 96
    description: 同花顺问财AI数据（期货筛选/查询/宏观/新闻/研报），通过iwencai-skillhub-cli技能调用
    params:
      base_url: https://openapi.iwencai.com
      env_api_key: IWENCAI_API_KEY
      install_dir: C:/Users/yangd/.iwencai-skillhub/skills
      installed_skills:
        - hithink-futures-selector   # 期货期权多条件筛选
        - hithink-futures-query      # 期货期权数据查询
        - hithink-basicinfo-query    # 基本资料查询
        - hithink-macro-query        # 宏观经济数据查询
        - news-search                # 新闻资讯搜索
        - report-search              # 研报搜索

  - name: tdx_local
    display_name: 通达信本地
    type: price
    enabled: true
    priority_intraday: 0   # 最高优先级（不论盘中盘后）
    priority_afternoon: 0  # 同上
    description: 通达信TQ-Local HTTP服务（127.0.0.1:17709），需要本地安装通达信且TdxW.exe正在运行
    params:
      http_url: http://127.0.0.1:17709/
      timeout: 5
