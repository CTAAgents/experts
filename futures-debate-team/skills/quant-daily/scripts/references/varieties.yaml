# 别名冲突注意事项：
# - "铜" → CU（上期所）；"国际铜" → BC（INE）
# - "LPG" → PG（DCE 液化石油气），不是 INE 的品种
# - "SA" → 纯碱（CZCE），烧碱是 SH（CZCE）
# - "PG" = DCE 液化石油气，多晶硅 = GFEX.PS
# - "LC" = 广期所碳酸锂，非 LME 铜
